services:
  # The "Money-Safe" Ledger Database [cite: 8, 56]
  db:
    image: postgres:17-alpine
    container_name: health_ledger_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d health_insurance"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Asynchronous Message Queue [cite: 13, 53]
  queue:
    image: redis:7.4-alpine
    container_name: payment_queue
    ports:
      - "6379:6379"

  # The Node.js API Service [cite: 23, 91]
  api:
    build: ./api
    container_name: health_api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - WIX_SECRET=${WIX_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app/docs
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_started

  # The Background Worker for Ledger Updates
  worker:
    build: ./api
    command: ["node", "dist/worker.js"]
    container_name: health_worker
    volumes:
      - ./docs:/app/docs
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_started